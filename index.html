<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMASH Support Chat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fc;
    height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:300px;
    background:#fff;
    border-right:1px solid #ddd;
    display:flex;
    flex-direction:column;
}

.logo{
    padding:20px;
    font-size:26px;
    font-weight:bold;
    color:#2563eb;
    border-bottom:1px solid #eee;
}

.search-box{
    padding:15px;
}

.search-box input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

.chat-list{
    flex:1;
    overflow-y:auto;
}

.chat-item{
    padding:15px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    transition:.3s;
}

.chat-item:hover{
    background:#f8fafc;
}

.chat-item.active{
    background:#dbeafe;
}

.chat-item h4{
    margin-bottom:5px;
}

.chat-item p{
    color:#666;
    font-size:14px;
}

/* ================= CHAT AREA ================= */

.chat-area{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat-header{
    background:#fff;
    padding:18px 25px;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.online{
    color:green;
    font-weight:600;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f8fafc;
}

.message{
    padding:12px 16px;
    border-radius:15px;
    margin-bottom:15px;
    max-width:70%;
    word-wrap:break-word;
}

.user{
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.bot{
    background:white;
    border:1px solid #ddd;
    color:#222;
}

.input-area{
    background:#fff;
    padding:15px;
    border-top:1px solid #ddd;
    display:flex;
    gap:10px;
}

.input-area input{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

.input-area button{
    border:none;
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

.input-area button:hover{
    background:#1d4ed8;
}

/* ================= RIGHT PANEL ================= */

.user-panel{
    width:280px;
    background:white;
    border-left:1px solid #ddd;
    padding:25px;
}

.user-panel h3{
    margin-bottom:20px;
}

.info{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.info p{
    color:#444;
}

/* ================= MOBILE ================= */

@media(max-width:992px){

    .user-panel{
        display:none;
    }

    .sidebar{
        width:240px;
    }
}

@media(max-width:768px){

    body{
        overflow:auto;
    }

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:220px;
    }

    .chat-area{
        height:calc(100vh - 220px);
    }
}

@media(max-width:480px){

    .message{
        max-width:90%;
        font-size:14px;
    }

    .logo{
        font-size:22px;
    }

    .chat-header{
        padding:15px;
    }

    .input-area{
        padding:10px;
    }

    .input-area button{
        padding:10px 15px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">⚡ SMASH CHAT</div>

        <div class="search-box">
            <input type="text" placeholder="Search Chats">
        </div>

        <div class="chat-list">

            <div class="chat-item active"
                 onclick="switchChat(this,'General Bot')">
                <h4>General Bot</h4>
                <p>Chat with AI Assistant</p>
            </div>

            <div class="chat-item"
                 onclick="switchChat(this,'Support Bot')">
                <h4>Support Bot</h4>
                <p>Technical Help</p>
            </div>

            <div class="chat-item"
                 onclick="switchChat(this,'FAQ Bot')">
                <h4>FAQ Bot</h4>
                <p>Common Questions</p>
            </div>

        </div>

    </aside>

    <!-- CENTER CHAT -->

    <main class="chat-area">

        <div class="chat-header">
            <h3 id="chatTitle">General Bot</h3>
            <span class="online">🟢 Online</span>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">

            <input
                type="text"
                id="userInput"
                placeholder="Type a message..."
                onkeydown="handleKey(event)"
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </main>

    <!-- RIGHT INFO PANEL -->

    <aside class="user-panel">

        <h3>User Information</h3>

        <div class="info">
            <p><strong>Name:</strong> Thomas Britton</p>
            <p><strong>Email:</strong> thomas@gmail.com</p>
            <p><strong>Country:</strong> USA</p>
            <p><strong>Status:</strong> Premium User</p>
            <p><strong>Plan:</strong> Gold</p>
        </div>

    </aside>

</div>

<script>

let currentChat = "General Bot";

let chatHistory = {
    "General Bot": [],
    "Support Bot": [],
    "FAQ Bot": []
};

function getResponse(msg){

    msg = msg.toLowerCase();

    if(msg.includes("hi") || msg.includes("hello"))
        return "Hello 👋 Welcome to SMASH Chat.";

    if(msg.includes("help"))
        return "Sure! Tell me your problem.";

    if(msg.includes("name"))
        return "My name is SMASH AI ⚡";

    if(msg.includes("bye"))
        return "Goodbye 👋 Have a great day.";

    if(msg.includes("support"))
        return "Our support team is available 24/7.";

    return "I'm still learning. Please ask another question.";
}

function addMessage(text,type){

    const messages =
        document.getElementById("messages");

    const div =
        document.createElement("div");

    div.className =
        `message ${type}`;

    div.innerText = text;

    messages.appendChild(div);

    messages.scrollTop =
        messages.scrollHeight;
}

function sendMessage(){

    const input =
        document.getElementById("userInput");

    const msg =
        input.value.trim();

    if(!msg) return;

    addMessage(msg,"user");

    chatHistory[currentChat].push({
        text:msg,
        type:"user"
    });

    input.value="";

    const reply =
        getResponse(msg);

    setTimeout(()=>{

        addMessage(reply,"bot");

        chatHistory[currentChat].push({
            text:reply,
            type:"bot"
        });

    },500);
}

function handleKey(e){

    if(e.key==="Enter"){
        sendMessage();
    }
}

function switchChat(el,chatName){

    currentChat = chatName;

    document.getElementById("chatTitle")
    .innerText = chatName;

    document
    .querySelectorAll(".chat-item")
    .forEach(item =>
        item.classList.remove("active")
    );

    el.classList.add("active");

    const messages =
        document.getElementById("messages");

    messages.innerHTML = "";

    chatHistory[chatName]
    .forEach(msg=>{

        addMessage(
            msg.text,
            msg.type
        );

    });
}

addMessage(
    "Hello 👋 Welcome to SMASH Chat. How can I help you?",
    "bot"
);

</script>

</body>
</html>
